pipeline:
  name: PRO-SPORT CI Pipeline
  identifier: prosport_ci_pipeline
  projectIdentifier: swp391_prosport
  orgIdentifier: default
  description: "CI pipeline for PRO-SPORT: builds frontend (Vite + React) and backend (.NET), runs lint & tests"

  properties:
    ci:
      codebase:
        connectorRef: account.github
        repoName: fptu-se-su26/swp391-su26-ai-audit-project-swp391_se20a02_group-03
        build: <+input>

  stages:
    # ========================================
    # Stage 1: Frontend CI (React + Vite)
    # ========================================
    - stage:
        name: Frontend CI
        identifier: frontend_ci
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: harness-builds
              automountServiceAccountToken: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: install_frontend_deps
                  spec:
                    connectorRef: account.dockerhub
                    image: node:20-alpine
                    shell: Sh
                    command: |
                      cd src/frontend
                      npm ci
                    
              - step:
                  type: Run
                  name: Lint Check
                  identifier: lint_frontend
                  spec:
                    connectorRef: account.dockerhub
                    image: node:20-alpine
                    shell: Sh
                    command: |
                      cd src/frontend
                      npm run lint || echo "Lint warnings found (non-blocking)"

              - step:
                  type: Run
                  name: Build Frontend
                  identifier: build_frontend
                  spec:
                    connectorRef: account.dockerhub
                    image: node:20-alpine
                    shell: Sh
                    command: |
                      cd src/frontend
                      npm run build
                      echo "✅ Frontend build successful"
                      echo "📦 Build output:"
                      ls -lh dist/

              - step:
                  type: Run
                  name: Check Bundle Size
                  identifier: check_bundle_size
                  spec:
                    connectorRef: account.dockerhub
                    image: node:20-alpine
                    shell: Sh
                    command: |
                      cd src/frontend
                      TOTAL_SIZE=$(du -sk dist/ | cut -f1)
                      echo "Total bundle size: ${TOTAL_SIZE}KB"
                      if [ "$TOTAL_SIZE" -gt 5120 ]; then
                        echo "⚠️  Warning: Bundle size exceeds 5MB"
                      else
                        echo "✅ Bundle size is within limits"
                      fi

    # ========================================
    # Stage 2: Backend CI (.NET)
    # ========================================
    - stage:
        name: Backend CI
        identifier: backend_ci
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: harness-builds
              automountServiceAccountToken: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Restore & Build Backend
                  identifier: build_backend
                  spec:
                    connectorRef: account.dockerhub
                    image: mcr.microsoft.com/dotnet/sdk:8.0
                    shell: Sh
                    command: |
                      cd src/backend
                      dotnet restore ProSport.slnx
                      dotnet build ProSport.slnx --configuration Release --no-restore
                      echo "✅ Backend build successful"

              - step:
                  type: Run
                  name: Run Unit Tests
                  identifier: test_backend
                  spec:
                    connectorRef: account.dockerhub
                    image: mcr.microsoft.com/dotnet/sdk:8.0
                    shell: Sh
                    command: |
                      cd src/backend
                      dotnet test ProSport.slnx --configuration Release --no-build --verbosity normal || echo "No test projects found yet"

    # ========================================
    # Stage 3: Audit Documentation Check
    # ========================================
    - stage:
        name: Audit Docs Check
        identifier: audit_docs_check
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: harness-builds
              automountServiceAccountToken: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Verify AI Audit Documentation
                  identifier: verify_audit_docs
                  spec:
                    connectorRef: account.dockerhub
                    image: alpine:latest
                    shell: Sh
                    command: |
                      echo "🔍 Checking required AI audit documentation..."
                      PASS=true

                      for doc in AI_AUDIT_LOG.md PROMPTS.md REFLECTION.md CHANGELOG.md; do
                        # Check in root docs/
                        if [ -f "docs/$doc" ]; then
                          echo "✅ docs/$doc exists"
                        else
                          # Check in member subdirectories
                          FOUND=false
                          for dir in docs/*/; do
                            if [ -f "${dir}${doc}" ]; then
                              echo "✅ ${dir}${doc} exists"
                              FOUND=true
                              break
                            fi
                          done
                          if [ "$FOUND" = "false" ]; then
                            echo "❌ Missing: $doc"
                            PASS=false
                          fi
                        fi
                      done

                      if [ "$PASS" = "false" ]; then
                        echo ""
                        echo "⚠️  Some audit docs are missing. Please add them before merging."
                        exit 1
                      fi

                      echo ""
                      echo "✅ All required audit documentation is present!"
